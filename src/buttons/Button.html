<!--
  Button / Primary — Arrow Design System
  Figma: https://www.figma.com/design/rRCDPR2SJ90wJZCr5rsXAd/Buttons?node-id=1-757

  Variants:
    Type:     Text | Icon
    Size:     50 | 100 | 200 | 300 | 400 | 500 | 600
    State:    rest | disabled | loading
-->

<!-- ─── Type=Text, Size=400 (default) ─────────────────────────────── -->
<button class="btn btn--primary btn--400" type="button">
  <span class="btn__label">Button</span>
</button>

<!-- ─── Type=Text with prefix icon ───────────────────────────────── -->
<button class="btn btn--primary btn--400" type="button">
  <span class="btn__prefix" aria-hidden="true"><!-- svg icon --></span>
  <span class="btn__label">Button</span>
</button>

<!-- ─── Type=Text with suffix icon ───────────────────────────────── -->
<button class="btn btn--primary btn--400" type="button">
  <span class="btn__label">Button</span>
  <span class="btn__suffix" aria-hidden="true"><!-- svg icon --></span>
</button>

<!-- ─── Type=Icon ────────────────────────────────────────────────── -->
<button class="btn btn--primary btn--icon btn--400" type="button" aria-label="Action name">
  <span class="btn__icon" aria-hidden="true"><!-- svg icon --></span>
</button>

<!-- ─── State=Disabled ───────────────────────────────────────────── -->
<button class="btn btn--primary btn--400" type="button" disabled>
  <span class="btn__label">Button</span>
</button>

<!-- ─── State=Loading (Progress=True) ───────────────────────────── -->
<button class="btn btn--primary btn--400" type="button" aria-busy="true" disabled>
  <span class="btn__label">Button</span>
  <span class="btn__spinner" aria-hidden="true"></span>
</button>

<!-- ─── All sizes ────────────────────────────────────────────────── -->
<button class="btn btn--primary btn--600" type="button"><span class="btn__label">Size 600</span></button>
<button class="btn btn--primary btn--500" type="button"><span class="btn__label">Size 500</span></button>
<button class="btn btn--primary btn--400" type="button"><span class="btn__label">Size 400</span></button>
<button class="btn btn--primary btn--300" type="button"><span class="btn__label">Size 300</span></button>
<button class="btn btn--primary btn--200" type="button"><span class="btn__label">Size 200</span></button>
<button class="btn btn--primary btn--100" type="button"><span class="btn__label">Size 100</span></button>
<button class="btn btn--primary btn--50"  type="button"><span class="btn__label">Size 50</span></button>
